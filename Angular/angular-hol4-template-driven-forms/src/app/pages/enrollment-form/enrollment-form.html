<h2>Student Enrollment Request Form</h2>

<form #enrollForm="ngForm"
      (ngSubmit)="onSubmit(enrollForm)">

    <!-- Student Name -->

    <label>Student Name</label>

    <input
        type="text"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel">

    <div class="error">

        <span
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">

            Name is required

        </span>

        <span
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">

            Name must be at least 3 characters

        </span>

    </div>

    <br>

    <!-- Email -->

    <label>Email</label>

    <input
        type="email"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel">

    <div class="error">

        <span
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">

            Email is required

        </span>

        <span
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">

            Enter a valid email

        </span>

    </div>

    <br>

    <!-- Course ID -->

    <label>Course ID</label>

    <input
        type="number"
        name="courseId"
        [(ngModel)]="courseId"
        required
        #courseCtrl="ngModel">

    <div class="error">

        <span
        *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">

            Course ID is required

        </span>

    </div>

    <br>

    <!-- Semester -->

    <label>Preferred Semester</label>

    <select
        name="preferredSemester"
        [(ngModel)]="preferredSemester"
        required
        #semesterCtrl="ngModel">

        <option value="">Select Semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>

    </select>

    <br><br>

    <!-- Checkbox -->

    <label>

        <input
            type="checkbox"
            name="agreeToTerms"
            [(ngModel)]="agreeToTerms"
            required
            #termsCtrl="ngModel">

        I Agree to Terms & Conditions

    </label>

    <div class="error">

        <span
        *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">

            Please accept the terms

        </span>

    </div>

    <br>

    <button
        type="submit"
        [disabled]="enrollForm.invalid">

        Submit

    </button>

    &nbsp;

    <button
        type="button"
        (click)="enrollForm.resetForm()">

        Reset

    </button>

</form>

<br>

<div
class="success"
*ngIf="submitted">

Enrollment request submitted successfully!

</div>
