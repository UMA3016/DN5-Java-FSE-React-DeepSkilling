<h2>
Student Enrollment Request Form
</h2>



<form
[formGroup]="enrollForm"
(ngSubmit)="onSubmit()">



<label>
Student Name
</label>


<input
type="text"
formControlName="studentName">



<br><br>




<label>
Email
</label>


<input
type="email"
formControlName="studentEmail">


<span class="error"
*ngIf="
enrollForm.get('studentEmail')?.errors?.['emailTaken']
">

Email already registered

</span>



<br><br>




<label>
Course ID
</label>


<input
type="text"
formControlName="courseId">


<span
class="error"

*ngIf="
enrollForm.get('courseId')?.errors?.['noCourseCode']
">

Course code starting with XX is not allowed.

</span>



<br><br>





<label>
Preferred Semester
</label>


<select
formControlName="preferredSemester">


<option value="Odd">
Odd
</option>


<option value="Even">
Even
</option>


</select>



<br><br>





<label>


<input
type="checkbox"
formControlName="agreeToTerms">


I Agree to Terms & Conditions


</label>



<br><br>





<h3>
Additional Courses
</h3>



<button
type="button"
(click)="addCourse()">

Add Another Course

</button>




<br><br>




<div
*ngFor="
let ctrl of additionalCourses.controls;
let i=index
">


<input
[formControl]="ctrl">


<button
type="button"
(click)="removeCourse(i)">

Remove

</button>



</div>



<br>



<button

type="submit"

[disabled]="enrollForm.invalid">

Submit

</button>



</form>
